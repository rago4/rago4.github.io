<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="theme-color" content="#2e2dff">
    <title>What the dog? 🐶</title>

    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css?family=Poppins" rel="stylesheet">
    <link rel="stylesheet" href="./dist/main.css">
</head>
<body>
    <div id="root"></div>

    <noscript>
        <div class="no-script__container">
            <p class="no-script__text no-script__text--big">
                <span>Hello hooman!</span>
                <span aria-hidden="true" aria-label="Waving hand emoji">👋</span>
            </p>
            <p class="no-script__text">Unfortunately, this app won't work at all without the JavaScript.</p>
            <p class="no-script__text">
                <span>But no worries. Here you have a collection of some cute dogs</span>
                <span aria-hidden="true" aria-label="Dog emoji">🐕</span>
            </p>
            <div class="no-script__gallery">
                <img src="./dist/images/pug.jpg" alt="" class="no-script__image">
                <img src="./dist/images/rhodesian-ridgeback.jpg" alt="" class="no-script__image">
                <img src="./dist/images/border-collie.jpg" alt="" class="no-script__image">
            </div>
        </div>
    </noscript>
    
    <script src="./dist/bundle.js"></script>
</body>
</html>
